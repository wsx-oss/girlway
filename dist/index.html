<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💌 一封小小的邀请</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    /* 主页面 */
    .page-invite {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec, #f3e5f5, #fce4ec);
      position: relative;
      overflow: hidden;
    }

    /* 浮动爱心 */
    .floating-heart {
      position: absolute;
      pointer-events: none;
      opacity: 0.25;
      animation: floatUp 4s ease-in infinite;
      font-size: 20px;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
    }

    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      padding: 48px 36px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      z-index: 10;
      border: 1px solid rgba(236,134,173,0.2);
    }

    .envelope { font-size: 56px; margin-bottom: 16px; animation: bounce 2s infinite; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .card h1 {
      font-size: 28px;
      color: #333;
      line-height: 1.6;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .movie-icon { font-size: 48px; margin: 20px 0; }

    .reject-msg {
      color: #e91e63;
      font-size: 14px;
      margin-bottom: 12px;
      animation: pulse 1s infinite;
      font-weight: 500;
      min-height: 20px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      margin-top: 28px;
    }

    @media (min-width: 480px) {
      .btn-row { flex-direction: row; justify-content: center; }
    }

    .btn-accept {
      padding: 14px 42px;
      background: linear-gradient(135deg, #ec407a, #e91e63);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(233,30,99,0.4);
      transition: all 0.3s ease;
      min-width: 160px;
    }

    .btn-accept:hover { transform: scale(1.1); box-shadow: 0 8px 32px rgba(233,30,99,0.5); }
    .btn-accept:active { transform: scale(0.95); }

    .btn-reject {
      padding: 12px 32px;
      background: linear-gradient(135deg, #7c4dff, #536dfe);
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 130px;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(124,77,255,0.35);
    }

    .btn-reject:hover { background: linear-gradient(135deg, #651fff, #304ffe); box-shadow: 0 6px 20px rgba(124,77,255,0.5); }

    .footer-hint {
      color: rgba(233,130,173,0.6);
      font-size: 12px;
      margin-top: 32px;
      z-index: 10;
    }

    /* 成功页面 */
    .page-success {
      min-height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f48fb1, #e91e63, #ef5350);
      position: relative;
      overflow: hidden;
    }

    .page-success.active { display: flex; }
    .page-invite.hidden { display: none; }

    .success-heart {
      position: absolute;
      animation: bounce 1.5s infinite;
      font-size: 24px;
    }

    .success-content {
      z-index: 10;
      text-align: center;
      padding: 24px;
    }

    .success-content .big-emoji {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s infinite;
    }

    .success-content h1 {
      font-size: 42px;
      color: #fff;
      font-weight: 800;
      margin-bottom: 16px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    }

    .success-content p {
      font-size: 20px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 8px;
    }

    .success-content .big-face {
      font-size: 56px;
      margin-top: 24px;
      animation: bounce 2s infinite;
    }

    .info-card {
      margin-top: 32px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 24px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .info-card p {
      font-size: 18px;
      color: #fff;
      margin: 6px 0;
    }

    .notify-tip {
      margin-top: 24px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .notify-tip p {
      font-size: 15px;
      color: #fff;
      margin: 4px 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- 邀请页 -->
  <div class="page-invite" id="pageInvite">
    <div class="card">
      <div class="envelope">💌</div>
      <h1>这周日约你看电影<br>好吗？</h1>
      <div class="movie-icon">🎬✨</div>
      <div class="reject-msg" id="rejectMsg"></div>
      <div class="btn-row">
        <button class="btn-accept" id="btnAccept">好呀 💕</button>
        <button class="btn-reject" id="btnReject">再想想...</button>
      </div>
    </div>
    <p class="footer-hint">💌 来自一个很想见你的人</p>
  </div>

  <!-- 成功页 -->
  <div class="page-success" id="pageSuccess">
    <div class="success-content">
      <div class="big-emoji">🎉</div>
      <h1>期待我们的见面</h1>
      <p>我会准时来接你的 💐</p>
      <div class="big-face">🥰</div>
      <div class="info-card">
        <p>📅 这周日</p>
        <p>🎬 一起看电影</p>
        <p>💕 不见不散</p>
      </div>
      <div class="notify-tip">
        <p>📧 已经把你的接受信息发送到他的邮箱啦～</p>
        <p>请及时告诉他你方便的时间哦 💬</p>
      </div>
    </div>
  </div>

  <script>
    const btnAccept = document.getElementById('btnAccept');
    const btnReject = document.getElementById('btnReject');
    const rejectMsg = document.getElementById('rejectMsg');
    const pageInvite = document.getElementById('pageInvite');
    const pageSuccess = document.getElementById('pageSuccess');

    const messages = [
      "不许拒绝！再想想？🥺",
      "你确定吗？我会很难过的😢",
      "再给我一次机会嘛～💕",
      "别点这个按钮啦！点另一个～🌹",
      "你忍心拒绝我吗？😭",
      "我已经买好票了呢～🎬",
      "拒绝无效！请重新选择 😤",
      "这个按钮坏了，点另一个吧 🔧",
    ];

    const rejectTexts = ["再想想...", "还是算了", "还是算了", "我点不到了", "我点不到了", "投降投降"];

    let rejectCount = 0;

    // 生成浮动爱心
    function createFloatingHeart() {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '💗';
      heart.style.left = Math.random() * 100 + '%';
      heart.style.bottom = '-30px';
      heart.style.fontSize = (16 + Math.random() * 20) + 'px';
      heart.style.animationDuration = (3 + Math.random() * 3) + 's';
      pageInvite.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createFloatingHeart, 600);

    // 同意
    btnAccept.addEventListener('click', function() {
      pageInvite.classList.add('hidden');
      pageSuccess.classList.add('active');

      // 生成成功页爱心
      for (let i = 0; i < 30; i++) {
        const h = document.createElement('div');
        h.className = 'success-heart';
        h.textContent = '💖';
        h.style.left = Math.random() * 100 + '%';
        h.style.top = Math.random() * 100 + '%';
        h.style.animationDelay = Math.random() * 2 + 's';
        h.style.animationDuration = (1 + Math.random() * 2) + 's';
        h.style.fontSize = (16 + Math.random() * 24) + 'px';
        pageSuccess.appendChild(h);
      }

      // 发送邮件通知
      var now = new Date();
      var timeStr = now.getFullYear() + '-' + (now.getMonth()+1) + '-' + now.getDate() + ' ' + now.getHours() + ':' + now.getMinutes();
      fetch('https://formsubmit.co/ajax/1730363705@qq.com', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          _subject: '🎉 她答应了！！！',
          message: '她在 ' + timeStr + ' 点击了「好呀」按钮！\n她之前点了 ' + rejectCount + ' 次拒绝才同意的哦～',
          _template: 'table'
        })
      }).catch(function(){});
    });

    // 拒绝 → 按钮随机移动
    btnReject.addEventListener('click', function() {
      rejectCount++;
      rejectMsg.textContent = messages[(rejectCount - 1) % messages.length];

      // 更新按钮文字
      const idx = Math.min(rejectCount, rejectTexts.length - 1);
      btnReject.textContent = rejectTexts[idx];

      // 随机移动拒绝按钮
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = btnReject.offsetWidth;
      const bh = btnReject.offsetHeight;

      const randX = Math.max(10, Math.random() * (vw - bw - 20));
      const randY = Math.max(10, Math.random() * (vh - bh - 20));

      btnReject.style.position = 'fixed';
      btnReject.style.left = randX + 'px';
      btnReject.style.top = randY + 'px';
      btnReject.style.transition = 'all 0.3s ease';

      // 按钮始终保持清晰可见可点击
      btnReject.style.fontSize = '17px';
      btnReject.style.opacity = '1';
    });
  </script>
</body>
</html>
